name: sica_vs_app
description: SICA-VS — App móvil para Residencial Villas del Sol
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP y almacenamiento
  http: ^1.2.0
  shared_preferences: ^2.2.2
  # Navegación
  go_router: ^13.2.0
  # QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.0
  # Almacenamiento seguro del token JWT
  flutter_secure_storage: ^9.2.2

  # Acceso por Bluetooth de baja energía (BLE)
  flutter_blue_plus: ^1.32.12
  device_info_plus: ^10.1.2

  # Abrir URLs externas (Google Wallet, WhatsApp, etc.)
  url_launcher: ^6.3.1

  # Imágenes y archivos
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.3.0
  # UI
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  intl: ^0.19.0
  share_plus: ^9.0.0
  path_provider: ^2.1.2
  # Notificaciones push
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.20
  flutter_local_notifications: ^17.0.0
  # Permisos en tiempo de ejecución (cámara, notificaciones)
  permission_handler: ^11.3.1
  # Bloqueo biométrico (huella / rostro)
  local_auth: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
